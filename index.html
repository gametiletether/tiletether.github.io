<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TileTether - AAA Login & Loading</title>
    <style>
        /* --- 1. PALET WARNA (Gabungan Tema) --- */
        :root {
            --gold: #ffd700; --gold-dark: #d4af37;
            --brown: #8b4513; --brown-dark: #5c2a0d;
            --green: #4caf50; --green-dark: #2e7d32;
            --blue: #1976d2; --blue-dark: #0d47a1;
            --red: #d32f2f; --red-dark: #b71c1c;
            --shadow: 0 4px 0 rgba(0,0,0,.55), 0 10px 24px rgba(0,0,0,.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* --- 2. LATAR BELAKANG DINAMIS --- */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image: 
                radial-gradient(circle at 25% 20%, rgba(255, 255, 255, 0.12) 0%, transparent 10%),
                radial-gradient(circle at 75% 15%, rgba(255, 255, 255, 0.15) 0%, transparent 15%),
                radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 20%),
                linear-gradient(to bottom, #0d1b2a 0%, #1b4965 45%, var(--green) 45.2%, var(--green-dark) 100%);
            transition: opacity 0.8s ease-in-out;
        }

        #bg-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.3), transparent), url('paths/path_01.png');
            background-size: cover;
            background-position: center;
            filter: blur(2px);
            opacity: 0.2;
            pointer-events: none;
        }

        /* --- 3. UI LOGIN --- */
        #auth-wrapper {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            z-index: 10;
        }

        .popup-box {
            width: 100%; max-width: 410px; padding: 20px;
            background: linear-gradient(180deg, var(--brown), var(--brown-dark));
            border: 4px solid var(--gold); outline: 4px solid #000; box-shadow: var(--shadow);
            display: flex; flex-direction: column; gap: 12px;
            position: relative;
            max-height: 95vh;
            overflow-y: auto;
        }

        .popup-title {
            font-size: 18px; font-weight: 900; text-transform: uppercase; color: var(--gold);
            text-shadow: 2px 2px 0 #000; text-align: center; border-bottom: 2px dashed rgba(255,215,0,.3); padding-bottom: 10px;
        }

        .form-group { display: flex; flex-direction: column; gap: 4px; text-align: left; }
        .form-group label { font-size: 11px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 0 #000; text-transform: uppercase; }
        .form-control { background: rgba(0,0,0,0.7); border: 2px solid var(--gold); padding: 10px; color: #fff; font-family: inherit; font-size: 13px; outline: none; }
        .form-control:focus { border-color: #fff; }
        
        /* --- 3.1 UI PEMILIHAN AVATAR --- */
        .avatar-section { display: none; flex-direction: column; gap: 6px; text-align: center; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; border: 1px dashed rgba(255,215,0,0.5); }
        .avatar-section label { font-size: 11px; font-weight: 900; color: var(--gold); text-shadow: 1px 1px 0 #000; text-transform: uppercase; }
        .avatar-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .avatar-item { width: 100%; aspect-ratio: 1; background: #000; border: 2px solid #555; border-radius: 4px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
        .avatar-item img { width: 100%; height: 100%; object-fit: cover; }
        .avatar-item.selected { border-color: var(--gold); box-shadow: 0 0 8px var(--gold); transform: scale(1.05); }

        .btn {
            border: 3px solid var(--gold); outline: 3px solid #000;
            background: linear-gradient(180deg, var(--blue), var(--blue-dark));
            color: #fff; font-family: inherit; font-size: 14px; font-weight: 900;
            text-transform: uppercase; cursor: pointer; padding: 12px;
            box-shadow: 0 4px 0 rgba(0,0,0,.5); text-shadow: 2px 2px 0 #000;
            transition: transform 0.1s; width: 100%;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.5); }
        .btn-green { background: linear-gradient(180deg, var(--green), var(--green-dark)); }
        .btn-red { background: linear-gradient(180deg, var(--red), var(--red-dark)); }

        /* --- 4. UI LOADING SCREEN (AAA) --- */
        #loader-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: none; /* Disembunyikan saat login muncul */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
        }

        .logo-container {
            width: 400px;
            max-width: 85vw;
            aspect-ratio: 6 / 1;
            background-image: url('logo.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            animation: 
                popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                float 4s ease-in-out infinite 0.8s;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }

        .progress-container {
            width: 320px;
            max-width: 80vw;
            height: 18px;
            background-color: var(--brown-dark);
            border: 2px solid var(--gold-dark);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            position: relative;
            animation: fadeIn 1s ease 0.5s both;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold), #fff, var(--gold));
            background-size: 200% 100%;
            border-radius: 6px;
            animation: shimmer 2s linear infinite;
        }

        .loading-info {
            display: flex;
            justify-content: space-between;
            width: 320px;
            max-width: 80vw;
            color: var(--gold);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease 0.5s both;
        }

        /* --- 5. KEYFRAMES ANIMASI & TRANSISI --- */
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

        .fade-out {
            opacity: 0 !important;
            transform: scale(1.05);
            pointer-events: none;
        }

        /* --- 6. IFRAME UTAMA --- */
        #game-frame {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none; z-index: 5;
            opacity: 0; /* Mulai transparan */
            transition: opacity 1s ease-in; /* Fade in halus */
            display: none;
        }
        
        .fade-in {
            display: block !important;
            opacity: 1 !important;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 4px; border: 1px solid #000; }
    </style>
</head>
<body>

    <!-- Latar Belakang Terpisah (Bisa dipudarkan) -->
    <div id="bg-container"></div>

    <!-- Tampilan Login -->
    <div id="auth-wrapper">
        <div class="popup-box">
            <div class="popup-title" id="authTitle">LOGIN AKUN</div>
            <form id="authForm" onsubmit="handleAuthSubmit(event)">
                <div class="form-group" id="usernameGroup" style="display:none;">
                    <label>Username</label>
                    <input type="text" id="authUsername" class="form-control" placeholder="Masukkan username unik">
                </div>
                
                <div class="avatar-section" id="avatarGroup">
                    <label>Pilih Avatar Anda</label>
                    <div class="avatar-grid" id="registerAvatarGrid"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="authEmail" class="form-control" required placeholder="nama@email.com">
                </div>
                <div class="form-group" id="ageGroup" style="display:none;">
                    <label>Umur (10 - 79 tahun)</label>
                    <input type="number" id="authAge" class="form-control" min="10" max="79" placeholder="Minimal 10 tahun">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" class="form-control" required placeholder="******">
                </div>
                <button type="submit" class="btn btn-green" style="margin-top: 10px;" id="authSubmitBtn">MASUK</button>
            </form>
            <div style="text-align:center; margin-top:8px;">
                <a href="#" id="toggleAuthModeBtn" onclick="toggleAuthMode(); return false;" style="color:var(--gold); font-size:12px; text-decoration:none;">Belum punya akun? Daftar di sini</a>
            </div>
            
            <div id="authErrorMsg" style="color: var(--red); font-size: 12px; font-weight: bold; text-align: center; margin-top: 8px;"></div>
        </div>
    </div>

    <!-- Tampilan Loading -->
    <div id="loader-wrapper">
        <div class="logo-container"></div>
        <div class="loading-wrapper">
            <div class="loading-info">
                <span id="loading-text">Menghubungkan...</span>
                <span id="loading-percent">0%</span>
            </div>
            <div class="progress-container" style="margin-top: 8px;">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <!-- Iframe Game Utama -->
    <iframe id="game-frame" src=""></iframe>

    <script type="module">
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB-lRvFDWFceXE1lloWeAP732uohRe7iLo",
            authDomain: "ambademo.firebaseapp.com",
            projectId: "ambademo",
            storageBucket: "ambademo.firebasestorage.app",
            messagingSenderId: "346919760984",
            appId: "1:346919760984:web:c9b102656aa020f3f2062d"
        };

        let auth, db;
        let authMode = 'login';
        let appLoaded = false;
        let selectedRegisterAvatar = 'avatar/avatar_01.png'; // Avatar bawaan
        const loadingDuration = 3000;

        // Inisialisasi Pilihan Avatar
        function initRegisterAvatars() {
            const grid = document.getElementById('registerAvatarGrid');
            grid.innerHTML = '';
            for(let i=1; i<=12; i++) {
                let fileName = `avatar/avatar_${i.toString().padStart(2, '0')}.png`;
                let div = document.createElement('div');
                div.className = 'avatar-item';
                if(i === 1) div.classList.add('selected'); // Pilih otomatis avatar pertama
                
                div.innerHTML = `<img src="${fileName}" onerror="this.src='characters/bob/idle_1.png'">`;
                div.onclick = () => {
                    document.querySelectorAll('#registerAvatarGrid .avatar-item').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedRegisterAvatar = fileName;
                };
                grid.appendChild(div);
            }
        }
        initRegisterAvatars();

        try {
            const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
            const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
            const { getFirestore, doc, setDoc, updateDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            window.signOutMethod = signOut;

            onAuthStateChanged(auth, async (user) => {
                if (user && !appLoaded) {
                    appLoaded = true;
                    // Update status isOnline ke true saat login berhasil
                    try {
                        await updateDoc(doc(db, "users", user.uid), { isOnline: true });
                    } catch (e) {
                        console.log("Gagal update status online", e);
                    }
                    startLoadingSequence();
                }
            });
            
            window.registerUserFB = async (email, password, username, age, avatarUrl) => {
                const res = await createUserWithEmailAndPassword(auth, email, password);
                
                // PERBAIKAN: Koin awal harus 100 agar sesuai dengan Rules Firebase
                const initialData = { 
                    uid: res.user.uid, 
                    username: username, 
                    email: email, 
                    age: parseInt(age), 
                    profilePic: avatarUrl,
                    coins: 100, // <--- Diperbarui dari 1000 menjadi 100
                    wins: 0, 
                    losses: 0, 
                    items: { antidead: 0, stalestill: 0, glidesteps: 0 }, 
                    isOnline: true 
                };
                await setDoc(doc(db, "users", res.user.uid), initialData);
            };
            
            window.loginUserFB = async (email, password) => {
                await signInWithEmailAndPassword(auth, email, password);
            };

        } catch(err) {
            console.warn("Firebase Init Error:", err);
            document.getElementById('authErrorMsg').innerText = "Koneksi Firebase gagal. Periksa koneksi internet Anda.";
        }

        // Fungsi Toggle Auth Mode
        window.toggleAuthMode = function() {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('authForm').reset();
            document.getElementById('authTitle').innerText = authMode === 'login' ? 'LOGIN AKUN' : 'DAFTAR AKUN BARU';
            
            // Atur Visibilitas Input Berdasarkan Mode
            document.getElementById('usernameGroup').style.display = authMode === 'login' ? 'none' : 'flex';
            document.getElementById('ageGroup').style.display = authMode === 'login' ? 'none' : 'flex';
            document.getElementById('avatarGroup').style.display = authMode === 'login' ? 'none' : 'flex';
            
            document.getElementById('authSubmitBtn').innerText = authMode === 'login' ? 'MASUK' : 'DAFTAR SEKARANG';
            document.getElementById('toggleAuthModeBtn').innerText = authMode === 'login' ? 'Belum punya akun? Daftar di sini' : 'Sudah punya akun? Login di sini';
            document.getElementById('authErrorMsg').innerText = "";
        };

        // Fungsi Submit Form
        window.handleAuthSubmit = async function(e) {
            e.preventDefault();
            document.getElementById('authErrorMsg').innerText = "";
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const username = document.getElementById('authUsername').value;
            const age = parseInt(document.getElementById('authAge').value);
            const btn = document.getElementById('authSubmitBtn');
            
            if (authMode === 'register' && (!username || isNaN(age) || age < 10 || age > 79)) {
                document.getElementById('authErrorMsg').innerText = "Mohon isi username dan umur (10-79) dengan benar.";
                return;
            }

            btn.disabled = true;
            btn.innerText = "MEMPROSES...";
            try {
                if (authMode === 'register') {
                    await window.registerUserFB(email, password, username, age, selectedRegisterAvatar);
                } else {
                    await window.loginUserFB(email, password);
                }
            } catch (err) {
                document.getElementById('authErrorMsg').innerText = err.message;
                btn.disabled = false;
                btn.innerText = authMode === 'login' ? 'MASUK' : 'DAFTAR SEKARANG';
            }
        };

        // Fungsi Menggabungkan Loading AAA
        function startLoadingSequence() {
            // (Sisa fungsi startLoadingSequence sama persis dengan kode Anda)
            document.getElementById('auth-wrapper').style.display = 'none';
            
            const loaderWrapper = document.getElementById('loader-wrapper');
            const bgContainer = document.getElementById('bg-container');
            const iframe = document.getElementById('game-frame');

            loaderWrapper.classList.remove('fade-out');
            loaderWrapper.style.display = 'flex';
            loaderWrapper.style.opacity = '1';
            
            bgContainer.style.display = 'block';
            bgContainer.style.opacity = '1';

            iframe.src = "mainmenu.html";

            const progressBar = document.getElementById('progress-bar');
            const percentText = document.getElementById('loading-percent');
            const statusText = document.getElementById('loading-text');

            const statusMessages = [
                "Menginisialisasi Mesin...", 
                "Memuat Lanskap...", 
                "Menyusun Aset Visual...", 
                "Membangun Interaksi...",
                "Mengoptimalkan Rendering...",
                "Siap Dimainkan!"
            ];

            let startTime = null;

            function updateProgress(currentTime) {
                if (!startTime) startTime = currentTime;
                const elapsed = currentTime - startTime;
                
                let t = Math.min(elapsed / loadingDuration, 1);
                let easeOutProgress = 1 - Math.pow(1 - t, 3);
                let progress = Math.min(easeOutProgress * 100, 100);
                
                progressBar.style.width = `${progress}%`;
                percentText.innerText = `${Math.floor(progress)}%`;

                const messageIndex = Math.min(
                    Math.floor((progress / 100) * statusMessages.length), 
                    statusMessages.length - 1
                );
                statusText.innerText = statusMessages[messageIndex];

                if (progress < 100) {
                    requestAnimationFrame(updateProgress);
                } else {
                    setTimeout(() => {
                        loaderWrapper.classList.add('fade-out');
                        bgContainer.style.opacity = '0';
                        iframe.classList.add('fade-in');
                        
                        setTimeout(() => {
                            loaderWrapper.style.display = 'none';
                            bgContainer.style.display = 'none';
                        }, 1000); 
                    }, 300);
                }
            }
            requestAnimationFrame(updateProgress);
        }

        // Listener Logout dari dalam Iframe
        window.addEventListener('message', async (event) => {
            if (event.data === 'DO_LOGOUT') {
                if (auth && auth.currentUser) {
                    const { updateDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                    // Update ke offline SEBELUM log out agar Rules tetap mengizinkan perubahan ini
                    try {
                        await updateDoc(doc(db, "users", auth.currentUser.uid), {
                            isOnline: false
                        });
                    } catch (e) {
                        console.error("Gagal mengupdate isOnline ke false", e);
                    }
                    
                    if (window.signOutMethod) {
                        await window.signOutMethod(auth);
                    }
                }
                appLoaded = false;
                
                // Reset Iframe
                const iframe = document.getElementById('game-frame');
                iframe.src = '';
                iframe.classList.remove('fade-in');
                
                // Munculkan kembali background & UI Auth
                document.getElementById('bg-container').style.display = 'block';
                document.getElementById('bg-container').style.opacity = '1';
                document.getElementById('auth-wrapper').style.display = 'flex';
                
                // Reset form state
                const btn = document.getElementById('authSubmitBtn');
                btn.disabled = false;
                btn.innerText = authMode === 'login' ? 'MASUK' : 'DAFTAR SEKARANG';
            }
        });
    </script>
</body>
</html>
